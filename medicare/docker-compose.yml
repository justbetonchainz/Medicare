services:
  postgres:
    image: postgres:16-alpine
    container_name: medrdv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medrdv
      POSTGRES_PASSWORD: medrdv
      POSTGRES_DB: medrdv
    ports:
      - "5432:5432"
    volumes:
      - medrdv_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medrdv -d medrdv"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: medrdv-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medrdv.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: medrdv-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: medrdv
      DB_PASSWORD: medrdv
      DB_NAME: medrdv
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: medrdv-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      JWT_ACCESS_SECRET: change-me-access-secret
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  medrdv_pg:
